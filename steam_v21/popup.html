<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #1b2838;
      color: #c7d5e0;
    }
    h2 {
      margin: 0 0 15px 0;
      color: #66c0f4;
    }
    label {
      display: block;
      margin: 15px 0 5px 0;
      font-size: 14px;
      color: #c7d5e0;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #4c6b82;
      background: #2a475e;
      color: #c7d5e0;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: #66c0f4;
      color: #1b2838;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
    button:hover {
      background: #88d4f7;
    }
    button:disabled {
      background: #4c6b82;
      cursor: not-allowed;
      color: #8f98a0;
    }
    button.debug {
      background: #8f98a0;
      font-size: 12px;
      padding: 8px;
      margin-top: 5px;
    }
    button.debug:hover {
      background: #a8b4bd;
    }
    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
      display: none;
    }
    .status.success {
      background: #5c7e10;
      display: block;
    }
    .status.error {
      background: #8b3a3a;
      display: block;
    }
    .status.info {
      background: #2a475e;
      display: block;
    }
    .info {
      font-size: 13px;
      color: #8f98a0;
      margin-top: 15px;
      line-height: 1.5;
    }
    input[type="file"] {
      display: none;
    }
    #debugInfo {
      margin-top: 10px;
      padding: 10px;
      background: #2a475e;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #debugInfo.show {
      display: block;
    }
  </style>
</head>
<body>
  <h2>Steam Artwork Uploader</h2>
  
  <label for="artworkTitle">Artwork Title:</label>
  <input type="text" id="artworkTitle" placeholder="My Awesome Artwork" maxlength="128">
  
  <label>Upload Type:</label>
  <div style="display: flex; gap: 10px; margin-bottom: 15px;">
    <button id="artworkMode" type="button" style="flex: 1; padding: 10px; background: #66c0f4;">Artwork (Sliced)</button>
    <button id="screenshotMode" type="button" style="flex: 1; padding: 10px; background: #4c6b82;">Screenshot</button>
    <button id="workshopMode" type="button" style="flex: 1; padding: 10px; background: #4c6b82;">Workshop</button>
  </div>

  <div id="sliceCountRow" style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
    <label style="color: #c6d4df; font-size: 13px; white-space: nowrap;">Slice count:</label>
    <button id="sliceCount5" type="button" style="flex: 1; padding: 8px; background: #66c0f4; font-size: 13px;">5 slices</button>
    <button id="sliceCount2" type="button" style="flex: 1; padding: 8px; background: #4c6b82; font-size: 13px;">2 slices</button>
  </div>
  
  <input type="file" id="fileInput" accept="image/*,.gif">
  <button id="selectBtn" type="button">Select Image</button>
  
  <button id="debugBtn" type="button" class="debug">Show Debug Info</button>
  
  <div id="debugInfo"></div>
  
  <p class="info" id="infoText">Images will be sliced into 5 pieces and uploaded automatically. Static and animated GIFs supported!</p>
  
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
